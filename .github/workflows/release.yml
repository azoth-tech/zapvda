name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          source venv/bin/activate
          pyinstaller vda.spec --clean

      - name: Create zip for macOS
        run: |
          cd dist
          zip -r ZapOrion_VDA_Analyzer-macos.zip ZapOrion_VDA_Analyzer.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: dist/ZapOrion_VDA_Analyzer-macos.zip

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\Activate
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: |
          .\venv\Scripts\Activate
          pyinstaller vda.spec --clean

      - name: Create zip for Windows
        run: |
          Compress-Archive -Path "dist\ZapOrion_VDA_Analyzer\*" -DestinationPath "dist\ZapOrion_VDA_Analyzer-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist\ZapOrion_VDA_Analyzer-windows.zip

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}